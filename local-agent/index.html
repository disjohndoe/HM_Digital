<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HM Digital Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: 16px;
      user-select: none;
      font-size: 13px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #0f172a;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: white;
      border-radius: 6px;
      margin-bottom: 6px;
      border: 1px solid #e2e8f0;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #94a3b8;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    .dot.gray { background: #94a3b8; }
    .dot.blue { background: #3b82f6; }
    .label { flex: 1; }
    .detail { color: #64748b; font-size: 11px; }
    button {
      padding: 2px 10px;
      font-size: 11px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    button:hover { background: #2563eb; }
    button.danger {
      background: #ef4444;
    }
    button.danger:hover { background: #dc2626; }
    .error {
      margin-top: 8px;
      padding: 8px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: #991b1b;
      font-size: 11px;
    }
    /* Setup state */
    .setup-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .setup-box .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .setup-box h2 {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .setup-box p {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .setup-box .steps {
      text-align: left;
      margin: 12px 0;
      padding-left: 16px;
    }
    .setup-box .steps li {
      font-size: 12px;
      color: #475569;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .pairing-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Configured state - footer */
    .footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer .tenant-info {
      color: #64748b;
      font-size: 11px;
    }
    .footer button {
      font-size: 11px;
      padding: 4px 12px;
      background: transparent;
      color: #64748b;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
    }
    .footer button:hover {
      background: #fee2e2;
      color: #dc2626;
      border-color: #fca5a5;
    }
  </style>
</head>
<body>
  <!-- Setup state (shown when not configured) -->
  <div id="setup-view" style="display: none;">
    <h1>HM Digital Agent</h1>
    <div class="setup-box">
      <div class="icon">🔌</div>
      <h2>Agent nije konfiguriran</h2>
      <p>Za povezivanje sa Vašom praksom:</p>
      <ol class="steps">
        <li>Prijavite se u <strong>HM Digital</strong> aplikaciju u pregledniku</li>
        <li>Idite na <strong>CEZIH Postavke</strong> → tab <strong>Postavke</strong></li>
        <li>Kliknite <strong>"Poveži agenta"</strong></li>
      </ol>
      <p id="pairing-status" style="color: #3b82f6; margin-top: 8px;"></p>
    </div>
    <div class="error" id="error-box" style="display: none;"></div>
  </div>

  <!-- Connected state (shown when configured) -->
  <div id="status-view" style="display: none;">
    <h1>HM Digital Agent</h1>

    <div class="status-row">
      <span class="dot" id="cloud-dot"></span>
      <span class="label" id="cloud-label">Oblak</span>
      <span class="detail" id="cloud-detail"></span>
    </div>

    <div class="status-row">
      <span class="dot" id="card-dot"></span>
      <span class="label" id="card-label">Smart kartica</span>
      <span class="detail" id="card-detail"></span>
    </div>

    <div class="status-row">
      <span class="dot" id="vpn-dot"></span>
      <span class="label" id="vpn-label">VPN</span>
      <span class="detail" id="vpn-detail"></span>
    </div>

    <div class="status-row" id="update-row" style="display: none;">
      <span class="dot" id="update-dot"></span>
      <span class="label" id="update-label">Ažuriranje</span>
      <span class="detail" id="update-detail"></span>
      <button id="restart-btn" style="display: none;" onclick="restartNow()">Restart</button>
    </div>

    <div class="error" id="error-box-2" style="display: none;"></div>

    <div class="footer">
      <span class="tenant-info" id="tenant-info"></span>
      <button onclick="resetConfig()">Odspoji</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
